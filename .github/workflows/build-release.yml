# Builds unsigned alpha installers for Linux, macOS (Intel + Apple Silicon),
# and Windows on each push of a fieldnotes-v* tag. No code signing: a fork
# without Apple Developer / Windows code-signing accounts ships unsigned
# bundles (the OS shows an unsigned-app warning on first launch; see README).
# tauri-action creates the GitHub release draft and uploads the artifacts.
name: Build Release

on:
  push:
    tags:
      - 'fieldnotes-v*.*.*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Fetch Holochain 0.6.1 binaries (Unix)
        if: runner.os != 'Windows'
        env:
          HC_RELEASE: holochain-0.6.1
        run: |
          mkdir -p src-tauri/binaries
          base="https://github.com/holochain/holochain/releases/download/${HC_RELEASE}"
          for bin in holochain lair-keystore; do
            dest="src-tauri/binaries/fieldnotes-${bin}-${{ matrix.target }}"
            curl -fsSL "${base}/${bin}-${{ matrix.target }}" -o "$dest"
            chmod +x "$dest"
            test "$(wc -c < "$dest")" -gt 1000000 || { echo "$bin download too small"; exit 1; }
          done

      - name: Fetch Holochain 0.6.1 binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          HC_RELEASE: holochain-0.6.1
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          $base = "https://github.com/holochain/holochain/releases/download/$env:HC_RELEASE"
          $t = "${{ matrix.target }}"
          foreach ($bin in "holochain","lair-keystore") {
            $dest = "src-tauri/binaries/fieldnotes-$bin-$t.exe"
            Invoke-WebRequest "$base/$bin-$t.exe" -OutFile $dest
            if ((Get-Item $dest).Length -lt 1000000) { throw "$bin download too small" }
          }

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FLOWSTA_CLIENT_ID: ${{ secrets.VITE_FLOWSTA_CLIENT_ID }}
          FIELDNOTES_BOOTSTRAP_URL: ${{ secrets.FIELDNOTES_BOOTSTRAP_URL }}
          FIELDNOTES_SIGNAL_URL: ${{ secrets.FIELDNOTES_SIGNAL_URL }}
          FIELDNOTES_RELAY_URL: ${{ secrets.FIELDNOTES_RELAY_URL }}
          FIELDNOTES_AUTH_MATERIAL: ${{ secrets.FIELDNOTES_AUTH_MATERIAL }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Fieldnotes ${{ github.ref_name }}'
          releaseBody: |
            Unsigned alpha build. Download the installer for your platform below.

            **macOS**: the app is not signed or notarised. Right-click the app and choose Open, or run `xattr -dr com.apple.quarantine /Applications/Fieldnotes.app` after installing.
            **Windows**: SmartScreen will warn on first launch. Click "More info" then "Run anyway".
            **Linux**: `.deb`, `.rpm`, and `.AppImage` are provided.

            Network: this alpha uses Holochain's public dev-test bootstrap server (intermittent, no uptime guarantees). A self-hosted bootstrap is a planned post-alpha step.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
